<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Math | IQ Mastery</title>
    <style>
        :root { --p: #a855f7; --bg: #030303; --card: #0f1012; --text: #f8fafc; --red: #ef4444; --green: #22c55e; --gold: #f59e0b; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; overflow-x: hidden; }
        .app { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Профиль */
        .profile-header { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--p); }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; }
        
        .fire-streak { position: absolute; top: 15px; right: 15px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        .xp-bar { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--p); width: 0%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Игровое поле */
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .hidden { display: none !important; }
        .box { background: var(--card); border: 1px solid #1e293b; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn-main { background: var(--p); color: white; width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main:active { transform: scale(0.96); }

        .q-display { font-size: 32px; font-weight: 900; text-align: center; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 18px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .opt-btn.correct { background: var(--green) !important; border-color: var(--green); }
        .opt-btn.wrong { background: var(--red) !important; border-color: var(--red); }
        
        .rank-tag { background: var(--p); padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>
    <div class="app">
        <!-- КАРТОЧКА ПРОФИЛЯ -->
        <div class="profile-header">
            <div id="fire-val" class="fire-streak hidden">🔥 0</div>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <span id="rank-name" class="rank-tag">НОВИЧОК</span>
                    <div style="font-size: 16px; margin-top: 8px; font-weight: 900;">LVL <span id="lvl">1</span></div>
                </div>
                <div style="font-size: 20px; font-weight: 800;">💰 <span id="coins">0</span></div>
            </div>
            <div class="xp-bar"><div id="xp-fill"></div></div>
            <div class="stats-row">
                <div><div class="stat-val" id="stat-k">0</div><div class="stat-label">Correct</div></div>
                <div><div class="stat-val" id="stat-kd">0.0</div><div class="stat-label">K/D (IQ)</div></div>
                <div><div class="stat-val" id="stat-d">0</div><div class="stat-label">Errors</div></div>
            </div>
        </div>

        <!-- МЕНЮ ВЫБОРА -->
        <div id="m-screen" class="screen">
            <h2 style="text-align:center; font-size: 28px; letter-spacing: -1px;">NEXUS CORE</h2>
            <div class="box">
                <select id="topic-sel" style="width:100%; padding:15px; border-radius:12px; background:#1e293b; color:white; border:none; margin-bottom:15px; font-weight:bold;">
                    <option value="algebra">Алгебра (Линейная)</option>
                    <option value="geometry">Геометрия (Метрика)</option>
                    <option value="trig">Тригонометрия (Advanced)</option>
                </select>
                <button class="btn-main" onclick="initGame()">ЗАПУСК СИСТЕМЫ</button>
            </div>
        </div>

        <!-- ИГРОВОЙ ПРОЦЕСС -->
        <div id="g-screen" class="screen hidden">
            <div style="text-align:center; color:var(--gold); font-weight:900; height: 20px;" id="streak-msg"></div>
            <div class="box">
                <div class="q-display" id="q-text">...</div>
                <div class="opt-grid" id="opt-grid"></div>
            </div>
            <div id="q-progress" style="text-align:center; color:#64748b; font-size:12px; font-weight:bold;">1 / 10</div>
        </div>
    </div>

    <script>
        let p = { 
            lv: 1, xp: 0, coins: 0, 
            k: parseInt(localStorage.getItem('nk')) || 0, 
            d: parseInt(localStorage.getItem('nd')) || 0,
            streak: 0
        };

        let session = { current: 0, topic: 'algebra' };

        // Умный генератор тригонометрии и задач
        const engine = {
            algebra: () => {
                const x = Math.floor(Math.random()*15)+2;
                const a = Math.floor(Math.random()*10)+1;
                const b = x * a;
                const types = [
                    {q: `${a}x = ${b}`, ans: x},
                    {q: `x / ${a} = ${x}`, ans: b},
                    {q: `x + ${b} = ${b+a}`, ans: a}
                ];
                const res = types[Math.floor(Math.random()*types.length)];
                return { q: res.q, ans: res.ans, opts: shuffle([res.ans, res.ans+2, res.ans-1, res.ans+5]) };
            },
            geometry: () => {
                const a = Math.floor(Math.random()*10)+3;
                return { q: `S квадрата (a=${a})`, ans: a*a, opts: shuffle([a*a, a*4, a*2, a*a-a]) };
            },
            trig: () => {
                const db = [
                    {q: 'sin(150°)', a: 0.5}, {q: 'cos(210°)', a: -0.87}, {q: 'tg(135°)', a: -1},
                    {q: 'sin(300°)', a: -0.87}, {q: 'cos(120°)', a: -0.5}, {q: 'sin(π)', a: 0},
                    {q: 'cos(π/2)', a: 0}, {q: 'tg(225°)', a: 1}, {q: 'sin(-30°)', a: -0.5},
                    {q: 'cos(3π/2)', a: 0}, {q: 'sin(3π/2)', a: -1}, {q: 'tg(π)', a: 0}
                ];
                const task = db[Math.floor(Math.random()*db.length)];
                return { q: task.q, ans: task.a, opts: shuffle([task.a, 0, 1, -1, 0.5, -0.5, 0.87, -0.87].slice(0,4)) };
            }
        };

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function initGame() {
            session.topic = document.getElementById('topic-sel').value;
            session.current = 0; p.streak = 0;
            toggle('g-screen');
            nextStep();
        }

        function nextStep() {
            if(session.current >= 10) {
                alert(`Цикл завершен! Твой K/D: ${document.getElementById('stat-kd').innerText}`);
                toggle('m-screen');
                return;
            }
            const data = engine[session.topic]();
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('q-progress').innerText = `${++session.current} / 10`;
            
            const grid = document.getElementById('opt-grid');
            grid.innerHTML = '';
            data.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o;
                b.onclick = () => verify(o, data.ans, b);
                grid.appendChild(b);
            });
        }

        function verify(val, cor, btn) {
            const btns = document.querySelectorAll('.opt-btn');
            btns.forEach(b => b.style.pointerEvents = 'none');

            if(val == cor) {
                btn.classList.add('correct');
                p.k++; p.streak++;
                p.xp += 20 + (p.streak * 2);
                p.coins += 5;
                if(p.streak >= 3) document.getElementById('streak-msg').innerText = `STREAK x${p.streak} 🔥`;
            } else {
                btn.classList.add('wrong');
                p.d++; p.streak = 0;
                document.getElementById('streak-msg').innerText = `STREAK LOST!`;
                // Подсветка правильного
                btns.forEach(b => { if(b.innerText == cor) b.classList.add('correct'); });
            }

            localStorage.setItem('nk', p.k);
            localStorage.setItem('nd', p.d);

            setTimeout(() => {
                document.getElementById('streak-msg').innerText = '';
                updateProfile();
                nextStep();
            }, 800);
        }

        function updateProfile() {
            if(p.xp >= 100) { p.lv++; p.xp = 0; }
            document.getElementById('lvl').innerText = p.lv;
            document.getElementById('coins').innerText = p.coins;
            document.getElementById('stat-k').innerText = p.k;
            document.getElementById('stat-d').innerText = p.d;
            document.getElementById('stat-kd').innerText = p.d === 0 ? p.k : (p.k / p.d).toFixed(1);
            document.getElementById('xp-fill').style.width = p.xp + '%';
            
            const f = document.getElementById('fire-val');
            if(p.streak >= 3) { f.classList.remove('hidden'); f.innerText = `🔥 ${p.streak}`; }
            else { f.classList.add('hidden'); }

            const ranks = ["НОВИЧОК", "УЧЕНИК", "БОЕЦ", "МАГИСТР", "NEXUS"];
            document.getElementById('rank-name').innerText = ranks[Math.min(Math.floor(p.lv/3), 4)];
        }

        function toggle(id) {
            document.getElementById('m-screen').classList.add('hidden');
            document.getElementById('g-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        updateProfile();
    </script>
</body>
</html>
