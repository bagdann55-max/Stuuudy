<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Math | IQ Overdrive</title>
    <style>
        :root { --p: #a855f7; --bg: #030303; --card: #0f1012; --text: #f8fafc; --red: #ef4444; --green: #22c55e; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* Стили Профиля (K/D) */
        .profile-header { background: var(--card); border: 1px solid #1e293b; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; text-align: center; margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px; }
        .stat-val { font-size: 18px; font-weight: 800; color: var(--p); }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; }
        
        .rank-badge { background: linear-gradient(45deg, var(--p), #6366f1); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .xp-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        #xp-fill { height: 100%; background: var(--p); width: 0%; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Игровые экраны */
        .screen { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 20px; }
        .hidden { display: none !important; }
        .box { background: var(--card); border: 1px solid #1e293b; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main { background: var(--p); color: white; box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(168, 85, 247, 0.6); }

        .q-display { font-size: 36px; font-weight: 900; text-align: center; letter-spacing: -1px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 20px; border-radius: 16px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .opt-btn.correct { background: var(--green); border-color: var(--green); }
        .opt-btn.wrong { background: var(--red); border-color: var(--red); }
        
        h2 { text-align: center; margin: 0; font-size: 28px; }
        .topic-tag { font-size: 12px; color: var(--p); text-align: center; font-weight: bold; margin-bottom: -15px; }
    </style>
</head>
<body>
    <div class="app">
        <!-- СЕКЦИЯ ПРОФИЛЯ -->
        <div class="profile-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <span class="rank-badge" id="rank-name">НОВИЧОК</span>
                    <div style="font-size: 14px; margin-top: 5px; font-weight: bold;">LVL <span id="lvl">1</span></div>
                </div>
                <div style="font-size: 22px;">💰 <span id="coins">0</span></div>
            </div>
            <div class="xp-container"><div id="xp-fill"></div></div>
            
            <div class="stats-row">
                <div><div class="stat-val" id="stat-k">0</div><div class="stat-label">Верно</div></div>
                <div><div class="stat-val" id="stat-kd">0.0</div><div class="stat-label">K/D (IQ)</div></div>
                <div><div class="stat-val" id="stat-d">0</div><div class="stat-label">Ошибки</div></div>
            </div>
        </div>

        <!-- МЕНЮ -->
        <div id="m-screen" class="screen">
            <h2>NEXUS MATH</h2>
            <div class="box">
                <select id="topic-sel" style="width:100%; padding:15px; border-radius:12px; background:#1e293b; color:white; border:none; margin-bottom:15px;">
                    <option value="algebra">Алгебра: Уровни 1-3</option>
                    <option value="geometry">Геометрия: Фигуры</option>
                    <option value="trig">Тригонометрия: ZEN</option>
                </select>
                <button class="btn btn-main" onclick="startSession()">В БОЙ</button>
            </div>
        </div>

        <!-- ИГРОВОЙ ЭКРАН -->
        <div id="g-screen" class="screen hidden">
            <div class="topic-tag" id="topic-tag">ALGEBRA MOD</div>
            <div class="box">
                <div class="q-display" id="q-text">2 + 2 = ?</div>
                <div class="opt-grid" id="opt-grid"></div>
            </div>
            <div style="text-align:center; color:#64748b; font-weight:bold;" id="q-progress">1 / 10</div>
        </div>
    </div>

    <script>
        let p = { 
            lv: 1, xp: 0, coins: 0, 
            k: parseInt(localStorage.getItem('nk')) || 0, 
            d: parseInt(localStorage.getItem('nd')) || 0 
        };

        let session = { current: 0, score: 0, topic: 'algebra' };

        function startSession() {
            session.topic = document.getElementById('topic-sel').value;
            session.current = 0; session.score = 0;
            document.getElementById('topic-tag').innerText = session.topic.toUpperCase();
            show('g-screen');
            nextQ();
        }

        // ГЕНЕРАТОР "НЕ СКУЧНЫХ" ЗАДАЧ
        const gen = {
            algebra: () => {
                const ops = ['+', '-', '*'];
                const op = ops[Math.floor(Math.random()*ops.length)];
                let a = Math.floor(Math.random()*20)+1;
                let b = Math.floor(Math.random()*15)+1;
                let q, ans;
                
                if(op === '*') { a = Math.floor(Math.random()*12); b = Math.floor(Math.random()*10); }
                
                // Рандомно делаем задачу со скобками
                if(Math.random() > 0.7) {
                    const c = Math.floor(Math.random()*5)+1;
                    q = `(${a} ${op} ${b}) - ${c}`;
                    ans = (op==='+'?a+b : op==='-'?a-b : a*b) - c;
                } else {
                    q = `${a} ${op} ${b} = ?`;
                    ans = op==='+'?a+b : op==='-'?a-b : a*b;
                }
                return { q, ans, opts: generateOpts(ans) };
            },
            geometry: () => {
                const types = [
                    {n: 'S квадрата со стор.', f: (s)=>s*s},
                    {n: 'P прямоуг. со стор.', f: (s)=>s*6}, // упрощенно
                    {n: 'S треуг. (осн. 4, выс. X)', f: (s)=>2*s}
                ];
                const t = types[Math.floor(Math.random()*types.length)];
                const val = Math.floor(Math.random()*10)+2;
                const ans = t.f(val);
                return { q: `${t.n} ${val}`, ans, opts: generateOpts(ans) };
            },
            trig: () => {
                const t = [{q:'sin(30°)', a:0.5}, {q:'cos(60°)', a:0.5}, {q:'tg(45°)', a:1}, {q:'sin(0)', a:0}];
                const p = t[Math.floor(Math.random()*t.length)];
                return { q: p.q, ans: p.a, opts: [p.a, 1, 0, -1] };
            }
        };

        function generateOpts(correct) {
            let s = new Set([correct]);
            while(s.size < 4) s.add(correct + (Math.floor(Math.random()*10)-5));
            return Array.from(s).sort(()=>Math.random()-0.5);
        }

        function nextQ() {
            if(session.current >= 10) {
                alert(`Сессия окончена! Точность: ${session.score * 10}%`);
                show('m-screen');
                return;
            }
            const data = gen[session.topic]();
            document.getElementById('q-text').innerText = data.q;
            document.getElementById('q-progress').innerText = `${session.current + 1} / 10`;
            
            const grid = document.getElementById('opt-grid');
            grid.innerHTML = '';
            data.opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o;
                b.onclick = () => check(o, data.ans, b);
                grid.appendChild(b);
            });
        }

        function check(val, cor, btn) {
            const all = document.querySelectorAll('.opt-btn');
            all.forEach(b => b.style.pointerEvents = 'none');

            if(val === cor) {
                btn.classList.add('correct');
                p.k++; session.score++; p.xp += 25; p.coins += 5;
            } else {
                btn.classList.add('wrong');
                p.d++;
            }
            
            localStorage.setItem('nk', p.k);
            localStorage.setItem('nd', p.d);

            setTimeout(() => {
                session.current++;
                updateUI();
                nextQ();
            }, 700);
        }

        function updateUI() {
            if(p.xp >= 100) { p.lv++; p.xp = 0; }
            document.getElementById('lvl').innerText = p.lv;
            document.getElementById('coins').innerText = p.coins;
            document.getElementById('xp-fill').style.width = p.xp + '%';
            
            document.getElementById('stat-k').innerText = p.k;
            document.getElementById('stat-d').innerText = p.d;
            
            // Расчет K/D
            const kd = p.d === 0 ? p.k.toFixed(1) : (p.k / p.d).toFixed(1);
            document.getElementById('stat-kd').innerText = kd;

            // Система рангов
            const ranks = ["НОВИЧОК", "УЧЕНИК", "СПЕЦ", "МАСТЕР", "ГЕНИЙ", "АРХИТЕКТОР"];
            const rIdx = Math.min(Math.floor(p.lv / 3), ranks.length - 1);
            document.getElementById('rank-name').innerText = ranks[rIdx];
        }

        function show(id) {
            document.getElementById('m-screen').classList.add('hidden');
            document.getElementById('g-screen').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
        }

        updateUI(); // Инициализация при загрузке
    </script>
</body>
</html>
