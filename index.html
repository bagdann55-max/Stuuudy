<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Nexus | Level Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Сетка профиля -->
        <header class="top-bar">
            <div class="user-info">
                <span id="user-level">LVL 1</span>
                <div class="xp-bar-bg"><div id="xp-bar-fill"></div></div>
                <span id="user-coins">💰 0</span>
            </div>
            <button onclick="showSection('game')">Мини-игра</button>
            <button onclick="showSection('shop')">Магазин</button>
            <button onclick="showSection('menu')">Главная</button>
        </header>

        <!-- Меню выбора -->
        <section id="section-menu" class="screen">
            <h1>ВЫБЕРИ ИСПЫТАНИЕ</h1>
            <div class="setup-box">
                <select id="select-topic">
                    <option value="algebra">Алгебра</option>
                    <option value="geometry">Геометрия</option>
                    <option value="trig">Тригонометрия</option>
                </select>
                <div class="diff-btns">
                    <button class="diff-btn active" data-diff="easy">Легко</button>
                    <button class="diff-btn" data-diff="hard">Сложно</button>
                </div>
                <button class="start-btn" onclick="startQuiz()">НАЧАТЬ ТЕСТ (10 ЗАДАЧ)</button>
            </div>
        </section>

        <!-- Экран теста -->
        <section id="section-quiz" class="screen hidden">
            <div class="quiz-header">
                <span id="q-progress">Вопрос 1/10</span>
                <span id="q-timer">00:30</span>
            </div>
            <h2 id="q-text">Пример задачи?</h2>
            <div class="options-grid">
                <button class="opt" onclick="checkAnswer(0)">A) <span id="opt0"></span></button>
                <button class="opt" onclick="checkAnswer(1)">B) <span id="opt1"></span></button>
                <button class="opt" onclick="checkAnswer(2)">C) <span id="opt2"></span></button>
                <button class="opt" onclick="checkAnswer(3)">D) <span id="opt3"></span></button>
            </div>
        </section>

        <!-- Мини-игра -->
        <section id="section-game" class="screen hidden">
            <h2>КЛИКЕР ЭНЕРГИИ</h2>
            <p>Кликай на сферу, чтобы получить доп. монеты!</p>
            <div id="sphere" onclick="clickSphere()"></div>
        </section>

        <!-- Магазин -->
        <section id="section-shop" class="screen hidden">
            <h2>МАГАЗИН БОНУСОВ</h2>
            <div class="shop-item">
                <span>Золотая тема (500 💰)</span>
                <button onclick="buyItem('gold')">Купить</button>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
