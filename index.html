<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Math AI | Competitive Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Статус-бар (Профиль) -->
        <div class="top-nav">
            <div class="profile-card">
                <div class="avatar">🎓</div>
                <div class="stats">
                    <div class="user-name">STUDENT_NEXUS</div>
                    <div class="xp-container">
                        <div id="xp-fill" style="width: 30%"></div>
                    </div>
                </div>
                <div class="level-badge">LVL <span id="lvl">1</span></div>
            </div>
            <div class="currency">💰 <span id="coins">0</span></div>
        </div>

        <!-- Основной контент -->
        <div id="screen-menu" class="screen">
            <h1 class="glitch">NEXUS MATH</h1>
            <div class="config-grid">
                <div class="config-item">
                    <label>Предмет</label>
                    <select id="topic-select">
                        <option value="algebra">Алгебра (Уравнения)</option>
                        <option value="geometry">Геометрия (Площади)</option>
                        <option value="trig">Тригонометрия (Функции)</option>
                    </select>
                </div>
                <div class="config-item">
                    <label>Сложность</label>
                    <div class="diff-toggle">
                        <button class="d-btn active" data-v="easy">Новичок</button>
                        <button class="d-btn" data-v="hard">Профи</button>
                    </div>
                </div>
            </div>
            <button class="main-start-btn" onclick="startEngine()">ЗАПУСК ТЕСТА</button>
        </div>

        <!-- Экран Теста -->
        <div id="screen-quiz" class="screen hidden">
            <div class="quiz-status">
                <div id="q-num">Вопрос 1/10</div>
                <div id="timer-bar"></div>
            </div>
            <div class="question-box">
                <div id="math-display"></div>
            </div>
            <div class="answers-grid" id="options">
                <!-- Кнопки генерируются скриптом -->
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
